name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "21"

      - name: Install SCons
        run: python -m pip install --upgrade pip scons

      - name: Build debug artifacts
        run: ./scripts/build_debug.sh

      - name: Build unit test binary
        run: python ./scripts/run_unit_tests.py --gtest_list_tests >/dev/null

      - name: Build integration test artifacts
        run: scons integration_tests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stagehand-build-artifacts
          path: |
            bin/**
            build/obj/**
            tests/unit/build/**
          if-no-files-found: error
          retention-days: 1
