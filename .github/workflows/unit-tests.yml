name: Unit Tests

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  unit-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "22"

      - name: Configure Clang toolchain
        shell: bash
        run: |
          echo "CC=${LLVM_PATH}/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=${LLVM_PATH}/bin/clang++" >> "$GITHUB_ENV"

      - name: Install SCons
        run: python -m pip install --upgrade pip scons

      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --name stagehand-build-artifacts --dir .

      - name: Restore unit test executable permissions
        shell: bash
        run: chmod +x tests/unit/build/stagehand_tests || true

      - name: Run unit tests
        run: python scripts/run_unit_tests.py
